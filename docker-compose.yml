services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Host port (avoid naming this PORT — that would confuse the app’s listen port)
      - "${HOST_PORT:-3939}:3939"
    environment:
      NODE_ENV: production
      PORT: "3939"
      # Optional: default is /app/data/fitness.db inside the container
      # DB_PATH: /app/data/fitness.db
    volumes:
      - fitness_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const p=process.env.PORT||3939;fetch('http://127.0.0.1:'+p+'/api/templates').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  fitness_data:
